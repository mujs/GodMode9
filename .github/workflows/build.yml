name: Build GodMode9

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm

    steps:
      - uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory /__w/GodMode9/GodMode9

      - name: Install firmtool
        run: |
          apt-get update
          apt-get install -y python3-pip
          pip3 install firmtool

      - name: Build firm
        run: make firm

      - name: Upload GodMode9.firm
        uses: actions/upload-artifact@v4
        with:
          name: GodMode9-modified
          path: output/GodMode9.firm
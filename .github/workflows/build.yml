name: Build GodMode9

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm

    steps:
      - uses: actions/checkout@v4

      - name: Build firm
        run: make firm

      - name: Upload GodMode9.firm
        uses: actions/upload-artifact@v4
        with:
          name: GodMode9-modified
          path: output/GodMode9.firm
